<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="380" viewBox="0 0 1080 380" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
<title>PR Harbormaster dashboard</title>
<desc>The dashboard with four columns — Stale, In Progress, Reviews, and Ready to Ship — showing example pull request cards. Illustration with sample data.</desc>
<rect x="0.5" y="0.5" width="1079" height="379" rx="10" fill="#0d1117" stroke="#30363d"/>

<!-- Header -->
<rect x="1" y="1" width="1078" height="47" rx="10" fill="#161b22"/>
<rect x="1" y="20" width="1078" height="28" fill="#161b22"/>
<line x1="1" y1="48" x2="1079" y2="48" stroke="#30363d"/>
<g transform="translate(16,13) scale(0.85)" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <line x1="5.5" y1="3.8" x2="5.5" y2="8"/>
  <path d="M5.5,4 H8 V6 H5.5"/>
  <rect x="3.5" y="8" width="4" height="3" rx="0.5"/>
  <rect x="2" y="11" width="6" height="4" rx="0.5"/>
  <line x1="2.6" y1="12.9" x2="7.4" y2="12.9"/>
  <rect x="9" y="8.5" width="8" height="6.5" rx="0.5"/>
  <line x1="13" y1="8.5" x2="13" y2="15"/>
  <line x1="9" y1="11.75" x2="17" y2="11.75"/>
  <path d="M2,15 H20 Q23.2,15 23.2,11.8 Q23.5,16 20.5,18.5 H5.5 Q3,18.5 2,16.2 Z"/>
  <line x1="5.5" y1="17" x2="19" y2="17"/>
</g>
<text x="46" y="30" font-size="15" font-weight="700" fill="#e6edf3">PR <tspan fill="#58a6ff">Harbormaster</tspan></text>
<rect x="178" y="14" width="74" height="20" rx="10" fill="#30363d"/>
<text x="215" y="28" font-size="11" fill="#7d8590" text-anchor="middle">@octocat</text>
<text x="872" y="29" font-size="11" fill="#7d8590" text-anchor="end">Updated just now</text>
